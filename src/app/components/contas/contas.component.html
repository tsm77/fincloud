<!-- eslint-disable @angular-eslint/template/elements-content -->
<!-- HEADER -->
<div class="flex justify-content-between align-items-center mb-4">
  <div>
    <h2 class="m-0">Contas</h2>
    <small class="text-500">Gerencie suas contas financeiras</small>
  </div>

  <p-button
    icon="pi pi-plus"
    label="Nova Conta"
    (onClick)="abrirModal()"
  ></p-button>
</div>

<!-- MENU GLOBAL -->
<p-menu
  #menu
  [popup]="true"
  [model]="menuItemsSelecionado"
  appendTo="body"
></p-menu>

<!-- GRID -->
<div class="grid">
  @for (c of contasFiltradas(); track c.id) {
    <div class="col-12 md:col-6 lg:col-4">
      <p-card styleClass="conta-card">
        <!-- HEADER -->
        <div class="flex justify-content-between align-items-center">
          <!-- INFO -->
          <div class="flex align-items-center gap-3">
            <div class="icon-box">
              <i class="pi pi-wallet"></i>
            </div>

            <div>
              <div class="font-semibold text-lg">
                {{ c.nome }}
              </div>

              <p-chip [label]="c.tipo" styleClass="text-xs mt-1"></p-chip>
            </div>
          </div>

          <!-- BOTÃO MENU -->
          <button
            pButton
            icon="pi pi-ellipsis-v"
            class="p-button-text p-button-rounded menu-btn"
            (click)="abrirMenu($event, c, menu)"
          ></button>
        </div>

        <!-- DIVIDER -->
        <div class="divider"></div>

        <!-- SALDO -->
        <div class="saldo-container">
          <span class="label">Saldo atual</span>

          <div
            class="valor"
            [ngClass]="{
              positivo: c.saldo >= 0,
              negativo: c.saldo < 0,
            }"
          >
            {{ c.saldo | currency: "BRL" }}
          </div>
        </div>
      </p-card>
    </div>
  }
</div>

<p-dialog
  header="Nova Conta"
  [visible]="modalNovaConta()"
  (visibleChange)="modalNovaConta.set($event)"
  [modal]="true"
  [style]="{ width: '420px' }"
  [draggable]="false"
  [resizable]="false"
>
  <form [formGroup]="form" class="flex flex-column gap-3 mt-2">
    <!-- NOME -->
    <div>
      <label class="block mb-2">Nome</label>
      <input
        pInputText
        formControlName="nome"
        class="w-full"
        placeholder="Ex: Nubank"
      />
    </div>

    <!-- TIPO -->
    <div>
      <label class="block mb-2">Tipo</label>
      <p-dropdown
        [options]="tipos"
        optionLabel="label"
        optionValue="value"
        formControlName="tipo"
        class="w-full"
      ></p-dropdown>
    </div>

    <!-- SALDO -->
    <div>
      <label class="block mb-2">Saldo inicial</label>
      <p-inputNumber
        formControlName="saldoInicial"
        mode="currency"
        currency="BRL"
        locale="pt-BR"
        class="w-full"
      ></p-inputNumber>
    </div>

    <!-- AÇÕES -->
    <div class="flex justify-content-end gap-2 mt-3">
      <button
        pButton
        label="Cancelar"
        class="p-button-text"
        (click)="modalNovaConta.set(false)"
      ></button>

      <button
        pButton
        label="Salvar"
        (click)="salvarConta()"
        [disabled]="form.invalid"
      ></button>
    </div>
  </form>
</p-dialog>
