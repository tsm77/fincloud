<div class="layout">
  <aside class="sidebar-desktop">
    <div class="sidebar-head">
      <div class="logo">
        <img class="brand-logo" src="assets/logo_fincloud.png" alt="FinCloud" />
      </div>
      <div class="brand-copy">
        <strong>FinCloud</strong>
        <span>Painel financeiro</span>
      </div>
    </div>

    <nav class="sidebar-nav" aria-label="Navegacao principal">
      @for (item of items; track item.route) {
        <a
          class="nav-link"
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <span class="nav-icon">
            <i [class]="item.icon"></i>
          </span>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="user-section">
      <button type="button" class="user-card" (click)="abrirUsuario()">
        <span class="user-avatar">{{ userInitials() }}</span>
        <span class="user-details">
          <span class="user-label">Minha conta</span>
          <span class="user-name">{{ userName() }}</span>
        </span>
        <i class="pi pi-chevron-right user-arrow"></i>
      </button>

      <button type="button" (click)="logout()" class="logout-button">
        <i class="pi pi-sign-out"></i>
        <span>Sair</span>
      </button>
    </div>
  </aside>

  <p-sidebar [(visible)]="menuOpen" position="left">
    <div class="mobile-sidebar-content">
      <div class="sidebar-head">
        <div class="logo">
          <img class="brand-logo" src="assets/logo_fincloud.png" alt="FinCloud" />
        </div>
        <div class="brand-copy">
          <strong>FinCloud</strong>
          <span>Painel financeiro</span>
        </div>
      </div>

      <nav class="sidebar-nav" aria-label="Navegacao principal">
        @for (item of items; track item.route) {
          <a
            class="nav-link"
            [routerLink]="item.route"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            (click)="menuOpen = false"
          >
            <span class="nav-icon">
              <i [class]="item.icon"></i>
            </span>
            <span>{{ item.label }}</span>
          </a>
        }
      </nav>

      <button
        type="button"
        class="user-card"
        (click)="abrirUsuario()"
      >
        <span class="user-avatar">{{ userInitials() }}</span>
        <span class="user-details">
          <span class="user-label">Minha conta</span>
          <span class="user-name">{{ userName() }}</span>
        </span>
        <i class="pi pi-chevron-right user-arrow"></i>
      </button>

      <button type="button" (click)="logout()" class="logout-button">
        <i class="pi pi-sign-out"></i>
        <span>Sair</span>
      </button>
    </div>
  </p-sidebar>

  <div class="content">
    <div class="topbar">
      <button
        pButton
        icon="pi pi-bars"
        (click)="menuOpen = true"
        aria-label="Abrir menu"
        class="menu-mobile-btn"
      ></button>

      <h2>Olá, {{ userName() }}</h2>
    </div>

    <div class="page">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
